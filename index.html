  --cxg-grad-usdt:      linear-gradient(135deg, #8B5CF6 0%, #EC4899 100%);
  --cxg-grad-eth:       linear-gradient(135deg, #A78BFA 0%, #60A5FA 100%);
  --cxg-grad-btc:       linear-gradient(135deg, #FBBF24 0%, #F97316 100%);
  --cxg-grad-brand:     linear-gradient(135deg, #6366F1 0%, #A855F7 100%);

  /* --- Radii --- */
  --cxg-r-xs:   6px;
  --cxg-r-sm:   8px;
  --cxg-r-md:   12px;
  --cxg-r-lg:   16px;
  --cxg-r-xl:   20px;
  --cxg-r-full: 999px;

  /* --- Shadows --- */
  --cxg-shadow-1: 0 1px 2px rgba(17,24,39,.04), 0 1px 3px rgba(17,24,39,.03);
  --cxg-shadow-2: 0 2px 6px rgba(17,24,39,.05), 0 4px 12px rgba(17,24,39,.04);
  --cxg-shadow-3: 0 8px 24px rgba(17,24,39,.08), 0 2px 6px rgba(17,24,39,.04);
  --cxg-shadow-primary: 0 6px 16px rgba(99,102,241,.28);
  --cxg-shadow-hero: 0 12px 32px rgba(139,92,246,.25);

  /* --- Spacing (8pt) --- */
  --cxg-s-1: 4px;
  --cxg-s-2: 8px;
  --cxg-s-3: 12px;
  --cxg-s-4: 16px;
  --cxg-s-5: 20px;
  --cxg-s-6: 24px;
  --cxg-s-7: 32px;
  --cxg-s-8: 40px;
  --cxg-s-9: 48px;
  --cxg-s-10: 64px;

  /* --- Motion --- */
  --cxg-ease:      cubic-bezier(.2,.8,.2,1);
  --cxg-ease-out:  cubic-bezier(.22,1,.36,1);
  --cxg-dur-fast:  120ms;
  --cxg-dur:       200ms;
  --cxg-dur-slow:  320ms;

  /* --- Typography --- */
  --cxg-font-sans: 'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  --cxg-font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;

  --cxg-fs-display: 32px;
  --cxg-fs-h1: 24px;
  --cxg-fs-h2: 18px;
  --cxg-fs-h3: 16px;
  --cxg-fs-body: 14px;
  --cxg-fs-small: 13px;
  --cxg-fs-label: 12px;
  --cxg-fs-micro: 11px;

  --cxg-lh-tight: 1.15;
  --cxg-lh-normal: 1.45;
  --cxg-lh-relaxed: 1.6;

  --cxg-tracking-label: 0.08em;   /* nav section labels */
}

/* ============================================================
   Semantic element defaults (use with .cxg-scope or at :root)
   ============================================================ */

.cxg-scope,
.cxg-scope * {
  box-sizing: border-box;
  font-variant-numeric: tabular-nums;
}

.cxg-scope {
  font-family: var(--cxg-font-sans);
  color: var(--cxg-fg-1);
  background: var(--cxg-canvas);
  font-size: var(--cxg-fs-body);
  line-height: var(--cxg-lh-normal);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

.cxg-scope h1, .cxg-h1 {
  font-size: var(--cxg-fs-h1);
  font-weight: 700;
  line-height: var(--cxg-lh-tight);
  letter-spacing: -0.01em;
  color: var(--cxg-fg-1);
  margin: 0;
}

.cxg-scope h2, .cxg-h2 {
  font-size: var(--cxg-fs-h2);
  font-weight: 600;
  line-height: var(--cxg-lh-tight);
  color: var(--cxg-fg-1);
  margin: 0;
}

.cxg-scope h3, .cxg-h3 {
  font-size: var(--cxg-fs-h3);
  font-weight: 600;
  color: var(--cxg-fg-1);
  margin: 0;
}

.cxg-scope p { margin: 0; color: var(--cxg-fg-2); }

.cxg-display {
  font-size: var(--cxg-fs-display);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.1;
  color: var(--cxg-fg-1);
}

.cxg-label {
  font-size: var(--cxg-fs-label);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: var(--cxg-tracking-label);
  color: var(--cxg-fg-5);
}

.cxg-micro {
  font-size: var(--cxg-fs-micro);
  color: var(--cxg-fg-4);
}

.cxg-mono { font-family: var(--cxg-font-mono); }

.cxg-delta-up   { color: var(--cxg-success); font-weight: 600; }
.cxg-delta-down { color: var(--cxg-danger);  font-weight: 600; }

/* --- Pulse dot (Live indicator) --- */
@keyframes cxg-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.35; transform: scale(.85); }
}
.cxg-pulse-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: var(--cxg-r-full);
  background: var(--cxg-success);
  animation: cxg-pulse 1.4s var(--cxg-ease) infinite;
  box-shadow: 0 0 0 3px rgba(16,185,129,.18);
}

/* --- Ticker fade for live numbers --- */
@keyframes cxg-tick {
  0%   { opacity: .2; transform: translateY(-6px); }
  100% { opacity: 1;  transform: translateY(0); }
}
.cxg-tick { animation: cxg-tick 180ms var(--cxg-ease-out) both; }

/* --- Sparkline draw --- */
@keyframes cxg-draw {
  from { stroke-dashoffset: var(--cxg-dash, 400); }
  to   { stroke-dashoffset: 0; }
}
.cxg-spark-path {
  stroke-dasharray: var(--cxg-dash, 400);
  animation: cxg-draw 700ms var(--cxg-ease-out) both;
}

/* --- Shimmer for loading / fresh data --- */
@keyframes cxg-shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
.cxg-shimmer {
  background: linear-gradient(90deg,
    rgba(99,102,241,0) 0%,
    rgba(99,102,241,.08) 50%,
    rgba(99,102,241,0) 100%);
  background-size: 200% 100%;
  animation: cxg-shimmer 1.8s linear infinite;
}
